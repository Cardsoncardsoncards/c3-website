name: Daily MTG Sync

on:
  schedule:
    # Runs at 03:00 UTC every day (1pm AEST / 2pm AEDT)
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Allows manual trigger from the Actions tab
    inputs:
      force_full_sync:
        description: 'Force full sync (rewrite all cards, ignore hashes)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run MTG sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          FORCE_FULL_SYNC: ${{ github.event.inputs.force_full_sync || 'false' }}
        run: node scripts/sync-mtg-daily.mjs
