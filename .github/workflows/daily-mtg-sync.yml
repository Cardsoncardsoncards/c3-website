name: Daily MTG Sync

on:
  schedule:
    # Runs at 03:00 UTC every day (1pm AEST / 2pm AEDT)
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Allows manual trigger from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run MTG sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: node scripts/sync-mtg-daily.mjs
