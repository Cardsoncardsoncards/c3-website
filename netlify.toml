[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "22"

[functions]
  node_bundler = "esbuild"

[functions."sitemap-cards"]
  timeout = 30

[functions."market-insights"]
  timeout = 26

[functions."lorcana-set-page"]
  timeout = 26

[functions."pokemon-set-page"]
  timeout = 26

[functions."yugioh-set-page"]
