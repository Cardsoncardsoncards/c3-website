[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "22"

[functions]
  node_bundler = "esbuild"

[functions."sitemap-cards"]
  timeout = 30

[functions."sync-lorcana"]
  timeout = 1200
  schedule = "30 11 * * *"

[functions."sync-onepiece"]
  timeout = 1200
  schedule = "0 11 * * *"

[functions."sync-pokemon"]
  timeout = 1500
  schedule = "0 10 * * *"

[functions."sync-yugioh"]
  timeout = 1500
  schedule = "30 10 * * *"

[functions."sync-riftbound"]
  timeout = 600
  schedule = "0 13 * * *"

[functions."sync-starwars"]
  timeout = 1200
  schedule = "30 12 * * *"

[functions."sync-dragonball"]
  timeout = 1200
  schedule = "0 12 * * *"

[[redirects]]
  from = "/blog/lorcana-booster-box-guide/"
  to = "/blog/best-lorcana-booster-boxes-australia/"
  status = 301

[[redirects]]
  from = "/blog/one-piece-starter-guide/"
  to = "/blog/one-piece-tcg-starter-deck-review-australia/"
  status = 301

[[redirects]]
  from = "/blog/pokemon-booster-box-guide/"
  to = "/blog/best-pokemon-booster-boxes-australia/"
  status = 301

[[redirects]]
  from = "/blog/mtg-tmnt-australia-guide/"
  to = "/blog/is-mtg-tmnt-worth-opening-australia/"
  status = 301

[[redirects]]
  from = "/blog/star-wars-unlimited-guide/"
  to = "/blog/star-wars-unlimited-beginners-guide-australia/"
  status = 301

[[redirects]]
  from = "/quiz"
  to = "/quizzes"
  status = 301
