[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "22"

[functions]
  node_bundler = "esbuild"

# ── Sitemap function timeouts (all 8 dynamic sitemaps + MTG) ─
[functions."sitemap-cards"]
  timeout = 30

[functions."sitemap-static"]
  timeout = 30

[functions."sitemap-pokemon"]
  timeout = 30

[functions."sitemap-yugioh"]
  timeout = 30

[functions."sitemap-lorcana"]
  timeout = 30

[functions."sitemap-onepiece"]
  timeout = 30

[functions."sitemap-riftbound"]
  timeout = 30

[functions."sitemap-dragonball"]
  timeout = 30

[functions."sitemap-starwars"]
  timeout = 30

# ── Blog redirects (old URLs -> current slugs) ──────────────
[[redirects]]
  from = "/blog/lorcana-booster-box-guide/"
  to = "/blog/best-lorcana-booster-boxes-australia/"
  status = 301

[[redirects]]
  from = "/blog/one-piece-starter-guide/"
  to = "/blog/one-piece-tcg-starter-deck-review-australia/"
  status = 301

[[redirects]]
  from = "/blog/pokemon-booster-box-guide/"
  to = "/blog/best-pokemon-booster-boxes-australia/"
  status = 301

[[redirects]]
  from = "/blog/mtg-tmnt-australia-guide/"
  to = "/blog/is-mtg-tmnt-worth-opening-australia/"
  status = 301

[[redirects]]
  from = "/blog/star-wars-unlimited-guide/"
  to = "/blog/star-wars-unlimited-beginners-guide-australia/"
  status = 301

# ── Missing blog posts -> best matching existing page ────────
[[redirects]]
  from = "/blog/what-is-riftbound/"
  to = "/blog/riftbound-card-game-beginners-guide-australia/"
  status = 301

[[redirects]]
  from = "/blog/dnd-battle-mats-australia/"
  to = "/blog/dnd-battle-mats-guide-australia/"
  status = 301

[[redirects]]
  from = "/blog/dragon-shield-vs-ultra-pro/"
  to = "/blog/best-tcg-card-sleeves-australia/"
  status = 301

[[redirects]]
  from = "/blog/toploaders-vs-magnetic-holders/"
  to = "/blog/best-tcg-card-sleeves-australia/"
  status = 301

[[redirects]]
  from = "/blog/what-is-magic-the-gathering-australia/"
  to = "/blog/what-is-mtg/"
  status = 301

# ── MTG set pages -> MTG hub (no set page function exists) ───
[[redirects]]
  from = "/cards/mtg/sets/*"
  to = "/cards/mtg"
  status = 301

# ── Non-MTG routing: v2 functions register their own paths via export const config ──
# These redirects are intentionally removed. The functions self-register at:
#   pokemon-hub.mjs        -> /cards/pokemon
#   yugioh-hub.mjs         -> /cards/yugioh
#   lorcana-hub.mjs        -> /cards/lorcana
#   onepiece-hub.mjs       -> /cards/onepiece
#   dragonball-hub.mjs     -> /cards/dragonball
#   starwars-hub.mjs       -> /cards/starwars
#   riftbound-hub.mjs      -> /cards/riftbound
#   *-set-page.mjs         -> /cards/*/sets/:slug+
#   *-card-page.mjs        -> /cards/*/:slug+
# Adding explicit redirects to /.netlify/functions/* overrides and breaks v2 routing.
