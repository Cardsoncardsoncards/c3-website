[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "22"

[functions]
  node_bundler = "esbuild"

[functions."sitemap-cards"]
  timeout = 30


[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://epnt.ebay.com https://fonts.googleapis.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://*.supabase.co https://www.google-analytics.com https://api.scryfall.com https://assets.tcgdex.net; frame-src 'self' https://tally.so; object-src 'none'; base-uri 'self'"

[[redirects]]
  from = "/blog/lorcana-booster-box-guide/"
  to = "/blog/best-lorcana-booster-boxes-australia/"
  status = 301

[[redirects]]
  from = "/blog/one-piece-starter-guide/"
  to = "/blog/one-piece-tcg-starter-deck-review-australia/"
  status = 301

[[redirects]]
  from = "/blog/pokemon-booster-box-guide/"
  to = "/blog/best-pokemon-booster-boxes-australia/"
  status = 301

[[redirects]]
  from = "/blog/mtg-tmnt-australia-guide/"
  to = "/blog/is-mtg-tmnt-worth-opening-australia/"
  status = 301

[[redirects]]
  from = "/blog/star-wars-unlimited-guide/"
  to = "/blog/star-wars-unlimited-beginners-guide-australia/"
  status = 301
