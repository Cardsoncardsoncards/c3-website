[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "22"

[functions]
  node_bundler = "esbuild"

[functions."sitemap-cards"]
  timeout = 30

# Security headers applied to all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://tally.so; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://*.supabase.co https://api.exchangerate-api.com https://api.tcgapi.dev https://www.google-analytics.com https://region1.google-analytics.com https://ebay.com https://*.ebay.com https://svgs.scryfall.io https://cards.scryfall.io https://c1.scryfall.com https://c2.scryfall.com; frame-src https://tally.so; worker-src 'none'; object-src 'none'; base-uri 'self';"
    X-XSS-Protection = "1; mode=block"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML pages: no cache (always fresh)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "/blog/lorcana-booster-box-guide/"
  to = "/blog/best-lorcana-booster-boxes-australia/"
  status = 301

[[redirects]]
  from = "/blog/one-piece-starter-guide/"
  to = "/blog/one-piece-tcg-starter-deck-review-australia/"
  status = 301

[[redirects]]
  from = "/blog/pokemon-booster-box-guide/"
  to = "/blog/best-pokemon-booster-boxes-australia/"
  status = 301

[[redirects]]
  from = "/blog/mtg-tmnt-australia-guide/"
