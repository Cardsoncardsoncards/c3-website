[[redirects]]
  from = "/cards/mtg/sets/*"
  to = "/cards/mtg"
  status = 301

# ── NOTE: All other game hub, set page, and card page routes ─
# are handled by v2 serverless functions via export const config
# { path: '...' } in each function file. Do NOT add redirects
# for these paths — doing so breaks the v2 function routing.
