[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "22"
  SECRETS_SCAN_OMIT_KEYS = "AMAZON_PA_PARTNER_TAG,AMAZON_PA_MARKETPLACE"

[functions]
  node_bundler = "esbuild"

[functions."sitemap-cards"]
  timeout = 30

[functions."market-insights"]
  timeout = 26

[functions."lorcana-set-page"]
  timeout = 26

[functions."pokemon-set-page"]
  timeout = 26

[functions."yugioh-set-page"]
  timeout = 26

[functions."card-compare"]
  timeout = 20

[functions."compare-search"]
  timeout = 10

[functions."dragonball-set-page"]
  timeout = 26

[functions."starwars-set-page"]
  timeout = 26

