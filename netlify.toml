[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "22"
  # INDEXNOW_KEY is deliberately public and MUST appear in the build output: IndexNow proves
  # host ownership by fetching /<key>.txt from the site root and matching it to the key in the
  # payload. Secrets scanning sees an env var value published verbatim and fails the build, so
  # it has to be told this one is intentional. It is not a credential; it grants nothing beyond
  # the right to tell search engines our own URLs changed.
  SECRETS_SCAN_OMIT_KEYS = "AMAZON_PA_PARTNER_TAG,AMAZON_PA_MARKETPLACE,INDEXNOW_KEY"

[functions]
  node_bundler = "esbuild"

# pokemon sitemap paginates up to 20k rows (~17-20 sequential Supabase fetches);
# default timeout is too tight, matching sitemap-cards at 30s.
[functions."sitemap-pokemon"]
  timeout = 30

# task-122: yugioh (16,102 rows) and weissschwarz (9,138 rows) are the other two
# sitemaps large enough that a cold cache-miss regeneration can approach the 10s
# default (pokemon's own cold run measured 9.76s). Give them the same 30s headroom.
[functions."sitemap-yugioh"]
  timeout = 30

[functions."sitemap-weissschwarz"]
  timeout = 30

[functions."market-insights"]
  timeout = 26

[functions."lorcana-set-page"]
  timeout = 26

[functions."pokemon-set-page"]
  timeout = 26

[functions."yugioh-set-page"]
  timeout = 26

[functions."card-compare"]
  timeout = 20

[functions."compare-search"]
  timeout = 10

[functions."dragonball-set-page"]
  timeout = 26

[functions."starwars-set-page"]
  timeout = 26

# ── MTG set pages have no dedicated handler yet: send /cards/mtg/sets/* to the hub.
#    Temporary (302) so it can be removed cleanly if an mtg-set-page function is added later.
[[redirects]]
  from = "/cards/mtg/sets/*"
  to = "/cards/mtg"
  status = 302

# ── task-129 Part 4: /subscribe merged into /account. Permanent redirect so existing inbound
#    links (and the nav Subscribe link) still resolve. subscribe.html is no longer shipped.
[[redirects]]
  from = "/subscribe"
  to = "/account"
  status = 301

[[redirects]]
  from = "/subscribe.html"
  to = "/account"
  status = 301

