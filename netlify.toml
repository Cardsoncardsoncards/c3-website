[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "22"

[functions]
  node_bundler = "esbuild"

# ── Sitemap function timeouts ────────────────────────────────
[functions."sitemap-cards"]
  timeout = 30

[functions."sitemap-static"]
  timeout = 30

[functions."sitemap-pokemon"]
  timeout = 30

[functions."sitemap-yugioh"]
  timeout = 30

[functions."sitemap-lorcana"]
  timeout = 30

[functions."sitemap-onepiece"]
  timeout = 30

[functions."sitemap-riftbound"]
  timeout = 30

[functions."sitemap-dragonball"]
  timeout = 30

[functions."sitemap-starwars"]
  timeout = 30

# ── Blog redirects (old URLs -> current slugs) ──────────────
[[redirects]]
  from = "/blog/lorcana-booster-box-guide/"
  to = "/blog/best-lorcana-booster-boxes-australia/"
  status = 301

